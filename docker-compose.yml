services:
  mongodb:
    image: mongo:7
    container_name: finance_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build: .
    container_name: finance_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=finance_app
    depends_on:
      - mongodb

volumes:
  mongo_data:
